<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knoten Documentation</title>
    <meta
      name="description"
      content="Documentation for Knoten — the static architecture and database visualiser for Laravel projects."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Knoten Documentation" />
    <meta
      property="og:description"
      content="How to use and understand Knoten — the static architecture & database map for Laravel."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/og.png" />
    <meta name="theme-color" content="#f9fafb" />

    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />

    <!-- Fonts (match knoten-site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/docs.css" />

    <!-- Prevent theme flash before docs.js runs -->
    <script>
      (function () {
        try {
          var t =
            localStorage.getItem("knoten-docs-theme") ||
            (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="progress" id="progress"></div>

    <!-- ── Topbar ─────────────────────────────────────────────── -->
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18" />
        </svg>
      </button>

      <a class="brand" href="/" aria-label="Knoten docs home">
        <img src="assets/logo.svg" alt="" width="30" height="30" />
        <span class="brand__name">Knoten</span>
        <span class="brand__docs">Docs</span>
      </a>

      <div class="topbar__spacer"></div>

      <div class="topbar__actions">
        <button class="search-trigger" id="searchTrigger" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
          </svg>
          <span class="st-label">Search the docs…</span>
          <span class="kbd">⌘K</span>
        </button>

        <a
          class="icon-btn"
          href="https://github.com/williamug/knoten"
          target="_blank"
          rel="noopener"
          aria-label="GitHub"
          title="GitHub"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.48v-1.7c-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.34 9.34 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.94.68 1.9v2.82c0 .27.18.59.69.48A10.02 10.02 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z" />
          </svg>
        </a>

        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" />
          </svg>
          <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Layout ─────────────────────────────────────────────── -->
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav id="sidebarNav" aria-label="Documentation"></nav>
      </aside>

      <main class="content" id="content"></main>

      <aside class="toc" id="toc">
        <div class="toc__title">On this page</div>
        <div id="tocList"></div>
      </aside>
    </div>

    <div class="scrim" id="scrim"></div>

    <!-- ── Search (⌘K) ────────────────────────────────────────── -->
    <div class="search-overlay" id="searchOverlay" role="dialog" aria-modal="true" aria-label="Search">
      <div class="search-box">
        <div class="search-box__head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="Search the documentation…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search"
          />
          <span class="kbd">Esc</span>
        </div>
        <div class="search-results" id="searchResults"></div>
        <div class="search-box__foot">
          <span><span class="kbd">↑</span><span class="kbd">↓</span> to navigate</span>
          <span><span class="kbd">↵</span> to open</span>
          <span><span class="kbd">Esc</span> to close</span>
        </div>
      </div>
    </div>

    <!-- Markdown + syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="assets/docs.js"></script>
  </body>
</html>
